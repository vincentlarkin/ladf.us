# ------------------------------------------------------------
#  LADF  -  ladf.us / www.ladf.us -> ladf_web:3911
# ------------------------------------------------------------

server {
    location ~ /\.(?!well-known) {
      deny all;
      return 404;
    }

    include _block_dotfiles.conf;

    listen 80;
    listen [::]:80;
    server_name ladf.us www.ladf.us;

    return 301 https://$host$request_uri;
}

server {
    location ~ /\.(?!well-known) {
      deny all;
      return 404;
    }

    include _block_dotfiles.conf;

    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name ladf.us www.ladf.us;

    ssl_certificate     /etc/nginx/ssl/ladf.us.pem;
    ssl_certificate_key /etc/nginx/ssl/ladf.us.key;

    proxy_read_timeout 300;
    proxy_connect_timeout 60;
    proxy_send_timeout 300;

    location / {
        proxy_pass http://ladf_web:3911;

        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
